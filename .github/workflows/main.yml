name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend deps
        run: npm install

      - name: Build + sign app
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PASSWORD }}
        run: |
          $keyPath = "$env:RUNNER_TEMP/tauri-key.json"
          Set-Content $keyPath $env:TAURI_SIGNING_PRIVATE_KEY
          $env:TAURI_SIGNING_PRIVATE_KEY_PATH = $keyPath
          npm run tauri build

      - name: Generate latest.json
        if: github.event_name == 'push'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace "^v", ""
          $sigFile = Get-ChildItem "src-tauri/target/release/bundle/nsis/" -Filter "*.sig" | Select-Object -First 1
          if ($sigFile) {
            $sig = (Get-Content $sigFile.FullName -Raw).Trim()
            $url = "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/Rush%20ID_${version}_x64-setup.exe"
            $pubDate = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            $json = @{
              version = "v$version"
              notes = "See the release notes for details."
              pub_date = $pubDate
              platforms = @{
                "windows-x86_64" = @{
                  signature = $sig
                  url = $url
                }
              }
            } | ConvertTo-Json -Depth 10
            $json | Set-Content "latest.json"
            Write-Host "latest.json generated"
          } else {
            Write-Host "No .sig file found"
          }

      - name: Upload latest.json artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: latest-windows
          path: latest.json

      - name: Create release & upload assets (tag push)
        if: github.event_name == 'push'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" `
            --title "Rush ID ${{ github.ref_name }}" `
            --notes "See the assets below to download the installer."

          gh release upload "${{ github.ref_name }}" `
            src-tauri/target/release/bundle/msi/*.msi `
            src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload artifacts (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: rush-id-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

  build-linux:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - name: Install frontend deps
        run: npm install

      - name: Build + sign app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PASSWORD }}
        run: |
          echo "$TAURI_SIGNING_PRIVATE_KEY" > "$RUNNER_TEMP/tauri-key.json"
          export TAURI_SIGNING_PRIVATE_KEY_PATH="$RUNNER_TEMP/tauri-key.json"
          npm run tauri build

      - name: Generate latest.json
        if: github.event_name == 'push'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SIG_FILE=$(find src-tauri/target/release/bundle/deb/ -name "*.sig" | head -1)
          if [ -n "$SIG_FILE" ]; then
            SIG=$(cat "$SIG_FILE" | tr -d '[:space:]')
            URL="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/rush-id_${VERSION}_amd64.deb"
            PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            cat > latest-linux.json << EOF
          {
            "version": "v${VERSION}",
            "notes": "See the release notes for details.",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "linux-x86_64": {
                "signature": "${SIG}",
                "url": "${URL}"
              }
            }
          }
          EOF
            echo "latest-linux.json generated"
          else
            echo "No .sig file found"
          fi

      - name: Upload latest.json artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: latest-linux
          path: latest-linux.json

      - name: Upload .deb to release (tag push)
        if: github.event_name == 'push'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            src-tauri/target/release/bundle/deb/*.deb \
            src-tauri/target/release/bundle/deb/*.sig || true

      - name: Upload artifacts (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: rush-id-linux
          path: src-tauri/target/release/bundle/deb/*.deb

  publish-updater-manifest:
    needs: [build-windows, build-linux]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all latest.json artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Merge latest.json files
        run: |
          VERSION=$(cat artifacts/latest-windows/latest.json | python3 -c "import sys,json; print(json.load(sys.stdin)['version'])")
          PUB_DATE=$(cat artifacts/latest-windows/latest.json | python3 -c "import sys,json; print(json.load(sys.stdin)['pub_date'])")
          WIN_SIG=$(cat artifacts/latest-windows/latest.json | python3 -c "import sys,json; print(json.load(sys.stdin)['platforms']['windows-x86_64']['signature'])")
          WIN_URL=$(cat artifacts/latest-windows/latest.json | python3 -c "import sys,json; print(json.load(sys.stdin)['platforms']['windows-x86_64']['url'])")

          cat > latest.json << EOF
          {
            "version": "${VERSION}",
            "notes": "See the release notes for details.",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "windows-x86_64": {
                "signature": "${WIN_SIG}",
                "url": "${WIN_URL}"
              }
          EOF

          if [ -f artifacts/latest-linux/latest-linux.json ]; then
            LINUX_SIG=$(cat artifacts/latest-linux/latest-linux.json | python3 -c "import sys,json; print(json.load(sys.stdin)['platforms']['linux-x86_64']['signature'])")
            LINUX_URL=$(cat artifacts/latest-linux/latest-linux.json | python3 -c "import sys,json; print(json.load(sys.stdin)['platforms']['linux-x86_64']['url'])")
            cat >> latest.json << EOF
              ,
              "linux-x86_64": {
                "signature": "${LINUX_SIG}",
                "url": "${LINUX_URL}"
              }
          EOF
          fi

          cat >> latest.json << EOF
            }
          }
          EOF

          echo "Merged latest.json:"
          cat latest.json

      - name: Upload merged latest.json to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" latest.json --clobber --repo jrchioco/rush_id_tauri
