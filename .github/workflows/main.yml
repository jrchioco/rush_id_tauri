name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend deps
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PASSWORD }}
        with:
          includeDebug: false

      - name: Upload artifacts (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: rush-id-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

      - name: Release (tag push)
        if: github.event_name == 'push'
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ github.ref_name }}" -replace "^v", ""
          $sigPath = Get-ChildItem "src-tauri/target/release/bundle/*/*.sig" | Select-Object -First 1
          $sig = Get-Content $sigPath.FullName -Raw | ForEach-Object { $_.Trim() }
          $url = "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/Rush%20ID_${version}_x64-setup.exe"
          $pubDate = (Get-Date).ToString("yyyy-MM-ddTHH:mm:ssZ")
          $json = @{
            version = $version
            notes = "See the release notes for details."
            pub_date = $pubDate
            platforms = @{
              "windows-x86_64" = @{
                signature = $sig
                url = $url
              }
            }
          }
          $json | ConvertTo-Json -Depth 10 | Set-Content "updates.json"

          gh release create "${{ github.ref_name }}" `
            --title "${{ github.ref_name }}" `
            --notes "See the assets to download and install this version."

          gh release upload "${{ github.ref_name }}" `
            src-tauri/target/release/bundle/msi/*.msi `
            src-tauri/target/release/bundle/nsis/*.exe `
            updates.json
