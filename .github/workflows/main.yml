name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend deps
        run: npm install

      - name: Build + sign app
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PASSWORD }}
        run: npm run tauri build

      - name: Generate latest.json
        if: github.event_name == 'push'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace "^v", ""
          $sigFile = Get-ChildItem "src-tauri/target/release/bundle/nsis/" -Filter "*.sig" | Select-Object -First 1
          if ($sigFile) {
            $sig = (Get-Content $sigFile.FullName -Raw).Trim()
            $url = "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/Rush%20ID_${version}_x64-setup.exe"
            $pubDate = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            $json = @{
              version = "v$version"
              notes = "See the release notes for details."
              pub_date = $pubDate
              platforms = @{
                "windows-x86_64" = @{
                  signature = $sig
                  url = $url
                }
              }
            } | ConvertTo-Json -Depth 10
            $json | Set-Content "latest.json"
            Write-Host "latest.json generated"
          } else {
            Write-Host "No .sig file found"
          }

      - name: Create release & upload assets (tag push)
        if: github.event_name == 'push'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" `
            --title "Rush ID ${{ github.ref_name }}" `
            --notes "See the assets below to download the installer."

          gh release upload "${{ github.ref_name }}" `
            src-tauri/target/release/bundle/msi/*.msi `
            src-tauri/target/release/bundle/nsis/*.exe `
            latest.json

      - name: Upload artifacts (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: rush-id-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
